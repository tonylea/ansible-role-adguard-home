---
adguard_home_version: "v0.107.54"

adguard_home_install_dir: /opt/AdGuardHome
adguard_home_work_dir: /var/lib/AdGuardHome
adguard_home_config_dir: /etc/AdGuardHome

adguard_home_user: adguardhome
adguard_home_group: adguardhome

adguard_home_web_port: 3000
adguard_home_dns_port: 53

adguard_home_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armv7

# Derived variables (do not override)
adguard_home_arch: "{{ adguard_home_arch_map[ansible_architecture] | default('amd64') }}"
adguard_home_download_url: "https://github.com/AdguardTeam/AdGuardHome/releases/download/{{ adguard_home_version }}/AdGuardHome_linux_{{ adguard_home_arch }}.tar.gz"
